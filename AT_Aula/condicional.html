 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script> 
let nome = prompt("Digite o seu nome:");
let idade = parseInt(prompt("Digite a sua idade:"));

let notas = [];

for (let i = 0; i < 3; i++) {
    notas[i] = parseFloat(prompt("Digite a nota " + (i + 1) + ":"));
}

let soma = 0;
let qtd = notas.length;

for (let i = 0; i < qtd; i++) {
    soma += notas[i];
}

let media = soma / qtd;

alert(
    "Nome: " + nome +
    "\nIdade: " + idade +
    "\nNotas: " + notas +
    "\nMédia: " + media.toFixed(2)
);
    </script>
    
 </body>
 </html>
