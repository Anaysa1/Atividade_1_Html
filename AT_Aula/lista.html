<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista</title>
</head>
<body>
    <script>
        let numeros = [1,2,3,4,5];

        alert ("A soma do primeiro e do ultimo numero é: "+somar(numeros[0], numeros[4]));

        function somar (a, b){
            return a+b;
        }
    </script>
</body>
</html>
