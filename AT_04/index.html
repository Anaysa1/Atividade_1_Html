<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotina</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #ffe6f0;
        }

        .tabela{
            border-collapse: collapse;
            width: 85%;
            margin: auto;
            text-align: center;
            background-color: #ffffff;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
        }

        .tabela th, .tabela td{
            border: 2px solid #ff99cc;
            padding: 12px;
        }

        .tabela caption{
            font-size: 28px;
            font-weight: bold;
            margin: 15px;
            color: #ff4ca6;
        }

        .tabela th{
            background-color: #ffb6d9;
            color: white;
        }

        .tabela td{
            background-color: #ffeaf4;
        }

    </style>
</head>
<body>

    <table class="tabela">

        <caption> Minha Rotina </caption>

        <tr>
            <th></th>
            <th>Domingo</th>
            <th>Segunda</th>
            <th>Terça</th>
            <th>Quarta</th>
            <th>Quinta</th>
            <th>Sexta</th>
            <th>Sábado</th>
        </tr>

        <tr>
            <th>Manhã</th>
            <td>Dormir</td>
            <td>Trabalhar</td>
            <td>Trabalhar</td>
            <td>Trabalhar</td>
            <td>Trabalhar</td>
            <td>Trabalhar</td>
            <td>Dormir</td>
        </tr>

        <tr>
            <th>Tarde</th>
            <td>Descansar</td>
            <td>Trabalhar</td>
            <td>Trabalhar</td>
            <td>Trabalhar</td>
            <td>Trabalhar</td>
            <td>Trabalhar</td>
            <td>Sair / Descansar</td>
        </tr>

        <tr>
            <th>Noite</th>
            <td>Descansar</td>
            <td colspan="5"> Faculdade </td>
            <td>Descansar</td>
        </tr>

    </table>

</body>
</html>
